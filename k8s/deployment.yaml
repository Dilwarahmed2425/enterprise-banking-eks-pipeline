apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-core-deployment
  namespace: default
  labels:
    app: banking-core
spec:
  replicas: 2
  selector:
    matchLabels:
      app: banking-core
  template:
    metadata:
      labels:
        app: banking-core
    spec:
      containers:
      - name: banking-app
        # Note: AWS_ACCOUNT_ID will be dynamically updated by Jenkins later
        image: AWS_ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/enterprise-banking-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        env:
        - name: DB_URL
          valueFrom:
            configMapKeyRef:
              name: banking-config
              key: DB_URL
        - name: BANKING_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: banking-secret
              key: BANKING_API_TOKEN